apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: poicrafter-gitops
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://github.com/aagolovko/poicrafter-gitops.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poicrafter-gitops
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/macosserver-cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: poicrafter-gitops

