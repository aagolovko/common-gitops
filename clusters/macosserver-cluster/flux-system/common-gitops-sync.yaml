apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: common-gitops
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  url: https://github.com/aagolovko/common-gitops.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: common-gitops
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/macosserver-cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: common-gitops

